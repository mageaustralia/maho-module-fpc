# Mageaustralia_Fpc — nginx configuration
#
# Add these map blocks to the http {} context (e.g. /etc/nginx/nginx.conf):

map $uri $fpc_uri {
    "/"     /index.html;
    default $uri;
}

map $args $fpc_prefix {
    ""      /var/fpc/default;  # Change "default" to your store code
    default "";
}

# Replace your location / block with:
# location / {
#     gzip_static on;
#     default_type text/html;
#     try_files $fpc_prefix$fpc_uri $uri $uri/ @handler;
# }

